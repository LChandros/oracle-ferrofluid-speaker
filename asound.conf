# ALSA configuration for Oracle speaker
# Allows multiple applications to capture from loopback simultaneously

pcm.oracle_loopback {
    type dsnoop
    ipc_key 5678293
    ipc_perm 0666
    ipc_gid audio
    slave {
        pcm "hw:2,1"
        channels 2
        rate 44100
        format S16_LE
        period_size 2048
        buffer_size 8192
    }
    bindings {
        0 0
        1 1
    }
}

# Convenience device with plug layer for format conversion
pcm.oracle_shared {
    type plug
    slave.pcm "oracle_loopback"
}
